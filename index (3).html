```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Gadget Store</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: Arial, sans-serif;
        }

        .store-title {
            font-weight: bold;
        }

        .card {
            border: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .product-price {
            color: #0d6efd;
            font-weight: bold;
        }

        .badge {
            font-size: 0.8rem;
        }

        .cart-btn {
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="container my-4">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h1 class="store-title">
                🛒 Tech Gadget Store
            </h1>

            <button
                class="btn btn-warning cart-btn"
                data-bs-toggle="modal"
                data-bs-target="#cartModal">

                Cart

                <span
                    id="cartCount"
                    class="badge rounded-pill bg-danger cart-count">

                    0

                </span>

            </button>

        </div>

        <!-- Products -->
        <div class="row" id="productGrid"></div>

    </div>

    <!-- Cart Modal -->
    <div class="modal fade" id="cartModal" tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Your Order Summary
                    </h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <ul
                        id="cartItemsList"
                        class="list-group mb-3">
                    </ul>

                    <h5>
                        Total Cost:
                        ₹<span id="totalPrice">0</span>
                    </h5>

                </div>

                <div class="modal-footer">

                    <button
                        class="btn btn-success w-100"
                        onclick="checkout()">

                        Place Order

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        // ===============================
        // BACKEND + DATABASE SIMULATION
        // ===============================

        // Product Database
        const products = [

            {
                id: 1,
                name: "Mechanical Keyboard",
                price: 2499,
                desc: "RGB backlit tactile typing switches."
            },

            {
                id: 2,
                name: "Wireless Ergonomic Mouse",
                price: 1299,
                desc: "High precision 2.4Ghz optical tracking."
            },

            {
                id: 3,
                name: "Noise Cancelling Headphones",
                price: 3999,
                desc: "Immersive over-ear audio experience."
            },

            {
                id: 4,
                name: "Gaming Monitor",
                price: 12999,
                desc: "144Hz ultra smooth display."
            },

            {
                id: 5,
                name: "USB-C Hub",
                price: 899,
                desc: "Multiport adapter for laptops."
            }

        ];

        // Cart Storage
        let cart = JSON.parse(
            localStorage.getItem('myCart')
        ) || [];

        // ===============================
        // FRONTEND LOGIC
        // ===============================

        // Load Products
        function loadProducts() {

            const grid =
                document.getElementById('productGrid');

            grid.innerHTML = '';

            products.forEach(product => {

                grid.innerHTML += `

                    <div class="col-md-4 mb-4">

                        <div class="card shadow-sm h-100">

                            <div class="card-body text-center">

                                <h5 class="card-title">
                                    ${product.name}
                                </h5>

                                <p class="text-muted">
                                    ${product.desc}
                                </p>

                                <h4 class="product-price">
                                    ₹${product.price}
                                </h4>

                                <button
                                    class="btn btn-outline-primary mt-2"
                                    onclick="addToCart(${product.id})">

                                    Add to Cart

                                </button>

                            </div>

                        </div>

                    </div>

                `;
            });

            updateCartUI();
        }

        // Add To Cart
        function addToCart(productId) {

            const product =
                products.find(p => p.id === productId);

            cart.push(product);

            localStorage.setItem(
                'myCart',
                JSON.stringify(cart)
            );

            updateCartUI();
        }

        // Update Cart UI
        function updateCartUI() {

            document.getElementById('cartCount')
                .innerText = cart.length;

            const list =
                document.getElementById('cartItemsList');

            list.innerHTML = '';

            let total = 0;

            cart.forEach((item, index) => {

                total += item.price;

                list.innerHTML += `

                    <li class="list-group-item d-flex justify-content-between align-items-center">

                        <div>

                            <strong>${item.name}</strong>

                            <br>

                            <small class="text-muted">
                                ₹${item.price}
                            </small>

                        </div>

                        <button
                            class="btn btn-sm btn-danger"
                            onclick="removeItem(${index})">

                            Remove

                        </button>

                    </li>

                `;
            });

            document.getElementById('totalPrice')
                .innerText = total;
        }

        // Remove Item
        function removeItem(index) {

            cart.splice(index, 1);

            localStorage.setItem(
                'myCart',
                JSON.stringify(cart)
            );

            updateCartUI();
        }

        // Checkout
        function checkout() {

            if (cart.length === 0) {

                alert("Your cart is empty!");
                return;
            }

            alert(
                "Order placed successfully! 🎉"
            );

            cart = [];

            localStorage.removeItem('myCart');

            updateCartUI();
        }

        // Initial Load
        loadProducts();

    </script>

</body>

</html>
